<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeTaalVan Mobiel</title>
    <link rel="icon" type="image/png" href="https://storage.e.jimdo.com/cdn-cgi/image/quality=85,fit=scale-down,format=auto,trim=0;0;0;0,width=800,height=800/image/524769538/ac481ce7-7c12-4986-8c85-1175f1f41f09.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/detaalvan-app/sw.js')
          .then((reg) => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && 
                    navigator.serviceWorker.controller) {
                  const banner = document.createElement('div');
                  banner.id = 'update-banner';
                  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#233652;color:white;text-align:center;padding:8px 16px;font-size:12px;z-index:9999;display:flex;align-items:center;justify-content:center;gap:12px;';
                  banner.innerHTML = '<span>Update beschikbaar</span><button onclick="location.reload()" style="background:white;color:#233652;border:none;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;">Updaten</button><button onclick="document.getElementById(\'update-banner\').remove()" style="background:transparent;color:white;border:none;font-size:14px;cursor:pointer;">✕</button>';
                  document.body.prepend(banner);
                }
              });
            });
          })
          .catch(() => {});
      });
    }
    </script>
    <script>
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Toon installatie banner na 3 seconden
        setTimeout(() => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
              deferredPrompt = null;
            });
          }
        }, 3000);
      });
    </script>
  </body>
</html>
